<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Instalist</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:
    HelveticaNeue,
    "Helvetica Neue",
    Helvetica,
    Arial,
    sans-serif;
}

body{
    background:
    linear-gradient(
        to bottom,
        #c5c5c5,
        #9d9d9d
    );

    min-height:100vh;
    color:#111;
    padding-bottom:190px;
}

/* APP */

.app{

    width:100%;
    max-width:500px;
    margin:auto;
}

/* HEADER */

.header{

    background:
    linear-gradient(
        to bottom,
        #6f6f6f,
        #2e2e2e
    );

    padding:18px 16px 14px;

    border-bottom:
    1px solid #000;

    box-shadow:
    inset 0 1px 0 rgba(255,255,255,.4);

    position:sticky;
    top:0;
    z-index:999;
}

.title{

    color:white;
    text-align:center;

    font-size:28px;
    font-weight:bold;

    text-shadow:
    0 -1px 0 rgba(0,0,0,.7);
}

.subtitle{

    text-align:center;
    color:#d8d8d8;

    margin-top:3px;
    font-size:12px;
}

/* SEARCH */

.search-wrap{

    padding:14px 14px 10px;
}

.search{

    width:100%;

    padding:12px 14px;

    border-radius:14px;

    border:
    1px solid #6d6d6d;

    background:
    linear-gradient(
        to bottom,
        #ffffff,
        #d9d9d9
    );

    font-size:16px;

    box-shadow:
    inset 0 2px 4px rgba(0,0,0,.2),
    0 1px 0 rgba(255,255,255,.8);

    outline:none;
}

/* UPLOAD */

.upload-wrap{

    padding:0 14px 14px;
}

.upload-btn{

    width:100%;

    padding:15px;

    border:none;

    border-radius:16px;

    background:
    linear-gradient(
        to bottom,
        #5d5d5d,
        #1d1d1d
    );

    color:white;

    font-size:16px;
    font-weight:bold;

    text-shadow:
    0 -1px 0 black;

    box-shadow:
    inset 0 1px 0 rgba(255,255,255,.3),
    0 2px 4px rgba(0,0,0,.35);

    cursor:pointer;
}

.upload-btn:active{

    background:
    linear-gradient(
        to bottom,
        #1d1d1d,
        #5d5d5d
    );
}

input[type=file]{
    display:none;
}

/* SONGS */

.song-list{

    padding:0 12px;
}

.song{

    display:flex;
    align-items:center;

    padding:10px;

    margin-bottom:12px;

    border-radius:18px;

    background:
    linear-gradient(
        to bottom,
        #f7f7f7,
        #d9d9d9
    );

    border:
    1px solid #9a9a9a;

    box-shadow:
    inset 0 1px 0 rgba(255,255,255,.9),
    0 2px 3px rgba(0,0,0,.15);
}

/* COVER */

.cover{

    width:66px;
    height:66px;

    border-radius:14px;

    overflow:hidden;

    flex-shrink:0;

    border:
    1px solid #8d8d8d;
}

.cover img{

    width:100%;
    height:100%;

    object-fit:cover;
}

/* SONG INFO */

.song-info{

    flex:1;
    margin-left:12px;

    overflow:hidden;
}

.song-title{

    font-size:17px;
    font-weight:bold;

    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;

    color:#111;
}

.song-sub{

    margin-top:5px;

    font-size:13px;

    color:#5f5f5f;
}

/* BUTTONS */

.song-btn{

    width:48px;
    height:48px;

    border:none;

    border-radius:50%;

    background:
    linear-gradient(
        to bottom,
        #ffffff,
        #bbbbbb
    );

    box-shadow:
    inset 0 1px 0 white,
    0 2px 4px rgba(0,0,0,.25);

    font-size:18px;

    cursor:pointer;
}

.song-btn:active{

    background:
    linear-gradient(
        to bottom,
        #bdbdbd,
        #fefefe
    );
}

/* EMPTY */

.empty{

    text-align:center;

    margin-top:80px;

    color:#444;

    font-size:18px;
}

/* PLAYER */

.player{

    position:fixed;
    bottom:0;
    left:0;

    width:100%;

    background:
    linear-gradient(
        to bottom,
        #5d5d5d,
        #232323
    );

    border-top:
    1px solid black;

    padding:14px 16px 28px;

    box-shadow:
    inset 0 1px 0 rgba(255,255,255,.2);
}

.player-top{

    display:flex;
    align-items:center;
}

.player-cover{

    width:64px;
    height:64px;

    border-radius:16px;

    overflow:hidden;

    border:
    1px solid #111;
}

.player-cover img{

    width:100%;
    height:100%;
    object-fit:cover;
}

.player-info{

    margin-left:12px;
    flex:1;
}

.now{

    color:white;

    font-size:16px;
    font-weight:bold;

    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;

    text-shadow:
    0 -1px 0 black;
}

.artist{

    color:#d5d5d5;

    margin-top:5px;

    font-size:13px;
}

/* PROGRESS */

.progress-wrap{

    margin-top:14px;
}

.progress{

    width:100%;
    appearance:none;

    height:7px;

    border-radius:999px;

    background:#1d1d1d;

    overflow:hidden;

    box-shadow:
    inset 0 1px 3px black;
}

.progress::-webkit-slider-thumb{

    appearance:none;

    width:20px;
    height:20px;

    border-radius:50%;

    background:
    linear-gradient(
        to bottom,
        white,
        #b9b9b9
    );

    border:
    1px solid #555;
}

.time{

    margin-top:7px;

    display:flex;
    justify-content:space-between;

    color:#dadada;

    font-size:11px;
}

/* CONTROLS */

.controls{

    display:flex;
    justify-content:center;
    align-items:center;

    gap:22px;

    margin-top:18px;
}

.ctrl{

    border:none;

    border-radius:50%;

    background:
    linear-gradient(
        to bottom,
        white,
        #bababa
    );

    box-shadow:
    inset 0 1px 0 white,
    0 2px 4px rgba(0,0,0,.4);

    cursor:pointer;
}

.ctrl:active{

    background:
    linear-gradient(
        to bottom,
        #bababa,
        white
    );
}

.small{

    width:54px;
    height:54px;

    font-size:22px;
}

.big{

    width:74px;
    height:74px;

    font-size:28px;
}

</style>
</head>

<body>

<div class="app">

<div class="header">

    <div class="title">
        Instalist
    </div>

    <div class="subtitle">
        i know you dont wanna buy spotify premium
    </div>

</div>

<div class="search-wrap">

    <input
    type="text"
    class="search"
    id="searchInput"
    placeholder="Search Songs">

</div>

<div class="upload-wrap">

    <button
    class="upload-btn"
    id="uploadButton">

    Add MP3 Files

    </button>

    <input
    type="file"
    id="fileInput"
    accept="audio/*"
    multiple>

</div>

<div
class="song-list"
id="songList">

    <div class="empty">
        No Songs Added
    </div>

</div>

</div>

<!-- PLAYER -->

<div class="player">

<div class="player-top">

    <div class="player-cover">

        <img
        id="playerImage"
        src="https://images.unsplash.com/photo-1511379938547-c1f69419868d?q=80&w=1200&auto=format&fit=crop">

    </div>

    <div class="player-info">

        <div
        class="now"
        id="nowPlaying">

        Nothing Playing

        </div>

        <div class="artist">
            Instalist Player
        </div>

    </div>

</div>

<div class="progress-wrap">

    <input
    type="range"
    class="progress"
    id="progress"
    min="0"
    max="100"
    value="0">

    <div class="time">

        <span id="currentTime">
            0:00
        </span>

        <span id="duration">
            0:00
        </span>

    </div>

</div>

<div class="controls">

    <button
    class="ctrl small"
    onclick="shuffleSong()">
    🔀
    </button>

    <button
    class="ctrl small"
    onclick="prevSong()">
    ⏮
    </button>

    <button
    class="ctrl big"
    id="playButton"
    onclick="togglePlay()">
    ▶
    </button>

    <button
    class="ctrl small"
    onclick="nextSong()">
    ⏭
    </button>

</div>

</div>

<audio id="audio"></audio>

<script>

/* ELEMENTS */

const fileInput =
document.getElementById(
"fileInput"
);

const uploadButton =
document.getElementById(
"uploadButton"
);

const songList =
document.getElementById(
"songList"
);

const audio =
document.getElementById(
"audio"
);

const progress =
document.getElementById(
"progress"
);

const playButton =
document.getElementById(
"playButton"
);

const searchInput =
document.getElementById(
"searchInput"
);

/* FIXED BUTTON */

uploadButton.addEventListener(
"click",
()=>{
    fileInput.click();
});

/* DATA */

let songs = [];

let currentSong = 0;

/* STOCK COVERS */

const covers = [

"https://images.unsplash.com/photo-1511379938547-c1f69419868d?q=80&w=1200&auto=format&fit=crop",

"https://images.unsplash.com/photo-1493225457124-a3eb161ffa5f?q=80&w=1200&auto=format&fit=crop",

"https://images.unsplash.com/photo-1516280440614-37939bbacd81?q=80&w=1200&auto=format&fit=crop"

];

/* FILE UPLOAD */

fileInput.addEventListener(
"change",
(e)=>{

    const files =
    [...e.target.files];

    files.forEach(file=>{

        songs.push({

            name:
            file.name.replace(".mp3",""),

            url:
            URL.createObjectURL(file),

            cover:
            covers[
                Math.floor(
                    Math.random()
                    * covers.length
                )
            ]

        });

    });

    renderSongs();

});

/* RENDER */

function renderSongs(filter=""){

    songList.innerHTML = "";

    const filteredSongs =
    songs.filter(song=>

        song.name
        .toLowerCase()
        .includes(
            filter.toLowerCase()
        )

    );

    if(filteredSongs.length === 0){

        songList.innerHTML = `
        <div class="empty">
            No Songs Found
        </div>
        `;

        return;
    }

    filteredSongs.forEach(song=>{

        const index =
        songs.indexOf(song);

        songList.innerHTML += `

        <div class="song">

            <div class="cover">

                <img
                src="${song.cover}">

            </div>

            <div class="song-info">

                <div class="song-title">

                    ${song.name}

                </div>

                <div class="song-sub">

                    MP3 Audio

                </div>

            </div>

            <button
            class="song-btn"
            onclick="playSong(${index})">

            ▶

            </button>

        </div>

        `;
    });

}

/* PLAY */

function playSong(index){

    currentSong = index;

    audio.src =
    songs[index].url;

    audio.play();

    playButton.innerText =
    "❚❚";

    document.getElementById(
    "nowPlaying"
    ).innerText =
    songs[index].name;

    document.getElementById(
    "playerImage"
    ).src =
    songs[index].cover;

    updateMediaSession();
}

/* PLAY PAUSE */

function togglePlay(){

    if(!audio.src && songs.length){

        playSong(0);
        return;
    }

    if(audio.paused){

        audio.play();

        playButton.innerText =
        "❚❚";

    } else {

        audio.pause();

        playButton.innerText =
        "▶";
    }
}

/* NEXT */

function nextSong(){

    if(songs.length === 0)
    return;

    currentSong++;

    if(currentSong >= songs.length){

        currentSong = 0;
    }

    playSong(currentSong);
}

/* PREVIOUS */

function prevSong(){

    if(songs.length === 0)
    return;

    currentSong--;

    if(currentSong < 0){

        currentSong =
        songs.length - 1;
    }

    playSong(currentSong);
}

/* SHUFFLE */

function shuffleSong(){

    if(songs.length === 0)
    return;

    const random =

    Math.floor(
        Math.random()
        * songs.length
    );

    playSong(random);
}

/* PROGRESS */

audio.addEventListener(
"timeupdate",
()=>{

    progress.value =

    (audio.currentTime
    / audio.duration)
    * 100 || 0;

    document.getElementById(
    "currentTime"
    ).innerText =
    formatTime(
        audio.currentTime
    );

    document.getElementById(
    "duration"
    ).innerText =
    formatTime(
        audio.duration
    );
});

progress.addEventListener(
"input",
()=>{

    audio.currentTime =

    (progress.value/100)
    * audio.duration;

});

/* FORMAT */

function formatTime(time){

    if(!time)
    return "0:00";

    const mins =
    Math.floor(time/60);

    const secs =
    Math.floor(time%60)
    .toString()
    .padStart(2,"0");

    return mins + ":" + secs;
}

/* SEARCH */

searchInput.addEventListener(
"input",
(e)=>{

    renderSongs(
        e.target.value
    );
});

/* AUTO NEXT */

audio.addEventListener(
"ended",
nextSong
);

/* LOCK SCREEN */

function updateMediaSession(){

    if("mediaSession"
    in navigator){

        navigator.mediaSession
        .metadata =

        new MediaMetadata({

            title:
            songs[currentSong]
            .name,

            artist:
            "Instalist",

            artwork:[
                {
                    src:
                    songs[currentSong]
                    .cover,

                    sizes:
                    "512x512",

                    type:
                    "image/png"
                }
            ]

        });

        navigator.mediaSession
        .setActionHandler(
            "play",
            ()=>audio.play()
        );

        navigator.mediaSession
        .setActionHandler(
            "pause",
            ()=>audio.pause()
        );

        navigator.mediaSession
        .setActionHandler(
            "nexttrack",
            nextSong
        );

        navigator.mediaSession
        .setActionHandler(
            "previoustrack",
            prevSong
        );
    }
}

</script>

</body>
</html>
